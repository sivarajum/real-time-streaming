<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Streaming Platform - Interactive Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4285f4;
            --secondary-color: #34a853;
            --accent-color: #ea4335;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            min-height: 100vh;
            margin: 0;
        }

        .demo-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .demo-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .streaming-flow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(90deg, #4285f4, #34a853);
            border-radius: 10px;
            color: white;
            flex-wrap: wrap;
        }

        .event-stream {
            max-height: 400px;
            overflow-y: auto;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .event-item {
            padding: 5px;
            margin: 2px 0;
            border-left: 3px solid #34a853;
            padding-left: 10px;
        }

        .metric-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 12px;
            background: var(--primary-color);
            color: white;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [events, setEvents] = useState([]);
            const [isStreaming, setIsStreaming] = useState(false);
            const [metrics, setMetrics] = useState({
                eventsPerSecond: 0,
                totalProcessed: 0,
                latency: 0
            });

            const startStreaming = () => {
                setIsStreaming(true);
                const interval = setInterval(() => {
                    const newEvent = {
                        id: Date.now(),
                        type: ['purchase', 'view', 'click'][Math.floor(Math.random() * 3)],
                        user_id: `user_${Math.floor(Math.random() * 1000)}`,
                        timestamp: new Date().toISOString(),
                        data: { amount: Math.random() * 100 }
                    };
                    setEvents(prev => [newEvent, ...prev].slice(0, 50));
                    setMetrics(prev => ({
                        eventsPerSecond: prev.eventsPerSecond + 1,
                        totalProcessed: prev.totalProcessed + 1,
                        latency: Math.random() * 5
                    }));
                }, 1000);

                setTimeout(() => {
                    clearInterval(interval);
                    setIsStreaming(false);
                }, 10000);
            };

            return (
                <div className="demo-container">
                    <div className="header">
                        <h1><i className="fas fa-stream"></i> Real-Time Streaming Platform</h1>
                        <p>Kafka + Spark Streaming + BigQuery</p>
                    </div>

                    <ul className="nav nav-tabs justify-content-center mb-4">
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'overview' ? 'active' : ''}`}
                                onClick={() => setActiveTab('overview')}>
                                Overview
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'streaming' ? 'active' : ''}`}
                                onClick={() => setActiveTab('streaming')}>
                                Live Streaming
                            </button>
                        </li>
                    </ul>

                    {activeTab === 'overview' && (
                        <div className="demo-card">
                            <div className="card-header" style={{background: 'linear-gradient(45deg, #4285f4, #34a853)', color: 'white', padding: '20px'}}>
                                <h3><i className="fas fa-info-circle"></i> Streaming Architecture</h3>
                            </div>
                            <div className="card-body">
                                <div className="streaming-flow">
                                    <div className="flow-step">
                                        <i className="fas fa-bolt fa-2x mb-2"></i>
                                        <div>Event Producers</div>
                                    </div>
                                    <i className="fas fa-arrow-right"></i>
                                    <div className="flow-step">
                                        <i className="fas fa-stream fa-2x mb-2"></i>
                                        <div>Kafka Topics</div>
                                    </div>
                                    <i className="fas fa-arrow-right"></i>
                                    <div className="flow-step">
                                        <i className="fas fa-cogs fa-2x mb-2"></i>
                                        <div>Spark Streaming</div>
                                    </div>
                                    <i className="fas fa-arrow-right"></i>
                                    <div className="flow-step">
                                        <i className="fas fa-database fa-2x mb-2"></i>
                                        <div>BigQuery</div>
                                    </div>
                                </div>

                                <div className="mt-4">
                                    <h5>Technologies:</h5>
                                    <span className="metric-badge">Kafka</span>
                                    <span className="metric-badge">Spark Streaming</span>
                                    <span className="metric-badge">BigQuery</span>
                                    <span className="metric-badge">Airflow</span>
                                    <span className="metric-badge">Kubernetes</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'streaming' && (
                        <div className="demo-card">
                            <div className="card-header" style={{background: 'linear-gradient(45deg, #4285f4, #34a853)', color: 'white', padding: '20px'}}>
                                <h3><i className="fas fa-stream"></i> Live Event Stream</h3>
                            </div>
                            <div className="card-body">
                                <button className="btn btn-primary mb-3" onClick={startStreaming} disabled={isStreaming}>
                                    {isStreaming ? 'Streaming...' : 'Start Streaming'}
                                </button>

                                <div className="row mb-3">
                                    <div className="col-md-4">
                                        <div className="metric-badge">
                                            Events/sec: {metrics.eventsPerSecond}
                                        </div>
                                    </div>
                                    <div className="col-md-4">
                                        <div className="metric-badge">
                                            Total: {metrics.totalProcessed}
                                        </div>
                                    </div>
                                    <div className="col-md-4">
                                        <div className="metric-badge">
                                            Latency: {metrics.latency.toFixed(2)}ms
                                        </div>
                                    </div>
                                </div>

                                <div className="event-stream">
                                    {events.map(event => (
                                        <div key={event.id} className="event-item">
                                            [{event.timestamp}] {event.type} - User: {event.user_id} - Amount: ${event.data.amount.toFixed(2)}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>
</body>
</html>
